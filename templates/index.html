<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfaceAI - Advanced Pothole Recognition</title>
    
    <!-- Modern Font for a sleek SaaS look -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-base: #f4f4f6;
            --bg-surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --brand: #4f46e5;
            --brand-light: #e0e7ff;
            --accent: #0ea5e9;
            --danger: #e11d48;
            --success: #10b981;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 4px 20px -2px rgba(0,0,0,0.05);
        }

        body.dark {
            --bg-base: #0B0F19;
            --bg-surface: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1f2937;
            --brand: #6366f1;
            --brand-light: rgba(99, 102, 241, 0.15);
            --danger: #f43f5e;
            --success: #34d399;
            --shadow-sm: 0 4px 20px -2px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Navbar */
        nav {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .brand-logo i {
            color: var(--brand);
            font-size: 1.5rem;
            padding: 8px;
            background: var(--brand-light);
            border-radius: var(--radius-sm);
        }

        .theme-btn {
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 99px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        @media (min-width: 1024px) {
            .main-layout {
                grid-template-columns: 360px 1fr;
                align-items: start;
            }
        }

        /* Left Panel - Control Center */
        .control-center {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .control-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-base);
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            background: transparent;
            border: 1px solid transparent;
            text-align: left;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tab:hover {
            background: var(--bg-base);
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--brand-light);
            color: var(--brand);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .tab i {
            font-size: 1.25rem;
        }

        .tab-content {
            display: none;
            padding: 1.5rem;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Upload Areas */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 3.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-surface);
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--brand);
            background: var(--brand-light);
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            color: var(--brand);
        }
        
        .upload-zone h4 {
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 1.1rem;
        }
        
        .upload-zone p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        input[type="file"] {
            display: none;
        }

        /* Right Panel - Dashboard */
        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .metric-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }

        .metric-info h5 {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .metric-info h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .metric-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .metric-icon i {
            width: 24px;
            height: 24px;
        }

        /* Charts & Maps Container */
        .visual-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        
        @media (min-width: 1280px) {
            .visual-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: var(--accent);
            width: 20px;
            height: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
        }

        #map {
            width: 100%;
            height: 300px;
            border-radius: var(--radius-sm);
            z-index: 10;
        }

        body.dark .leaflet-tile {
            filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
        }

        /* Web Cam & Results */
        .btn-action {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        
        .btn-primary:hover {
            background: #3730a3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }

        .result-container {
            margin-top: 1.5rem;
        }

        .result-info {
            background: var(--bg-base);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 1rem;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .result-info strong {
            color: var(--text-primary);
        }

        img, video {
            max-width: 100%;
            border-radius: var(--radius-sm);
            display: block;
            border: 1px solid var(--border);
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--brand);
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        body.dark .loading {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--brand);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <!-- Navbar -->
    <nav>
        <div class="brand-logo">
            <i data-lucide="scan-face"></i>
            SurfaceAI Monitor
        </div>
        <button class="theme-btn" onclick="toggleTheme()">
            <i data-lucide="sun" id="theme-icon"></i>
            <span id="theme-text">Light Mode</span>
        </button>
    </nav>

    <!-- Main Workspace -->
    <div class="main-layout">
        
        <!-- Left Panel: Operations Console -->
        <aside class="control-center">
            <div class="control-header">
                <h3 style="font-size: 1.15rem; font-weight: 800;">Detection Mode</h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Select the data source to analyze.</p>
            </div>
            
            <div class="nav-tabs">
                <button class="tab active" onclick="switchTab('image')">
                    <i data-lucide="image"></i> Static Image Analysis
                </button>
                <button class="tab" onclick="switchTab('video')">
                    <i data-lucide="film"></i> Video Stream Processing
                </button>
                <button class="tab" onclick="switchTab('webcam')">
                    <i data-lucide="webcam"></i> Live Edge Node (Webcam)
                </button>
            </div>

            <!-- Tab Content: Image -->
            <div id="image-tab" class="tab-content active">
                <div class="upload-zone" id="imageDropZone" onclick="document.getElementById('imageInput').click()">
                    <div class="icon-circle"><i data-lucide="upload-cloud" style="width: 32px; height: 32px;"></i></div>
                    <h4>Upload Image</h4>
                    <p>JPEG, PNG files supported</p>
                    <input type="file" id="imageInput" accept="image/*" onchange="uploadImage(this.files[0])" onclick="event.stopPropagation()">
                </div>
                <div id="imageResult" class="result-container"></div>
            </div>

            <!-- Tab Content: Video -->
            <div id="video-tab" class="tab-content">
                <div class="upload-zone" id="videoDropZone" onclick="document.getElementById('videoInput').click()">
                    <div class="icon-circle"><i data-lucide="video" style="width: 32px; height: 32px;"></i></div>
                    <h4>Upload Video</h4>
                    <p>MP4, AVI, MOV up to 100MB</p>
                    <input type="file" id="videoInput" accept="video/*" onchange="uploadVideo(this.files[0])" onclick="event.stopPropagation()">
                </div>
                <div id="videoResult" class="result-container"></div>
            </div>

            <!-- Tab Content: Webcam -->
            <div id="webcam-tab" class="tab-content">
                <div style="margin-bottom: 1.5rem;">
                    <button class="btn-action btn-primary" onclick="startWebcam()">
                        <i data-lucide="play-circle"></i> Initialize Webcam
                    </button>
                    <button class="btn-action btn-danger" onclick="stopWebcam()" style="display: none;" id="stopWebcamBtn">
                        <i data-lucide="stop-circle"></i> Terminate Feed
                    </button>
                </div>
                
                <video id="videoElement" autoplay style="display: none; width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border);"></video>
                <canvas id="webcamCanvas" style="display: none;"></canvas>
                <div id="webcamResult" class="result-container"></div>
            </div>
        </aside>

        <!-- Right Panel: Analytics & Map -->
        <main class="dashboard-content">
            
            <!-- Metrics Row -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-info">
                        <h5>Frames Processed</h5>
                        <h2 id="totalImages">0</h2>
                    </div>
                    <div class="metric-icon" style="color: var(--brand); background: var(--brand-light);">
                        <i data-lucide="cpu"></i>
                    </div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-info">
                        <h5>Anomalies Alerted</h5>
                        <h2 id="totalPotholes">0</h2>
                    </div>
                    <div class="metric-icon" style="color: var(--danger); background: rgba(225, 29, 72, 0.1);">
                        <i data-lucide="alert-triangle"></i>
                    </div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-info">
                        <h5>Model Confidence</h5>
                        <h2>96.4%</h2>
                    </div>
                    <div class="metric-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);">
                        <i data-lucide="shield-check"></i>
                    </div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-info">
                        <h5>System Status</h5>
                        <h2 style="font-size: 1.6rem; margin-top: 6px;">Online</h2>
                    </div>
                    <div class="metric-icon" style="color: var(--accent); background: rgba(14, 165, 233, 0.1);">
                        <i data-lucide="activity"></i>
                    </div>
                </div>
            </div>

            <!-- Map and Charts -->
            <div class="visual-grid">
                <div class="panel-box">
                    <div class="panel-title">
                        <i data-lucide="bar-chart-2"></i> Operational Analytics
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="analyticsChart"></canvas>
                    </div>
                </div>

                <div class="panel-box">
                    <div class="panel-title">
                        <i data-lucide="map"></i> Geographic Hotspots
                    </div>
                    <div id="map"></div>
                </div>
            </div>
            
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Theme Management
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (isDark) {
                icon.setAttribute('data-lucide', 'moon');
                text.textContent = 'Dark Mode';
            } else {
                icon.setAttribute('data-lucide', 'sun');
                text.textContent = 'Light Mode';
            }
            
            lucide.createIcons();
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
            document.getElementById('theme-text').textContent = 'Dark Mode';
            lucide.createIcons();
        }

        // Tab Navigation
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            lucide.createIcons();
        }

        // Drag & Drop Handlers - Image
        const imageDropZone = document.getElementById('imageDropZone');
        imageDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageDropZone.classList.add('drag-over');
        });
        imageDropZone.addEventListener('dragleave', () => {
            imageDropZone.classList.remove('drag-over');
        });
        imageDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            imageDropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('imageInput').files = e.dataTransfer.files;
                uploadImage(file);
            }
        });

        // Drag & Drop Handlers - Video
        const videoDropZone = document.getElementById('videoDropZone');
        videoDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            videoDropZone.classList.add('drag-over');
        });
        videoDropZone.addEventListener('dragleave', () => {
            videoDropZone.classList.remove('drag-over');
        });
        videoDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            videoDropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                document.getElementById('videoInput').files = e.dataTransfer.files;
                uploadVideo(file);
            }
        });

        // API Interactions
        async function uploadImage(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);
            
            const resultDiv = document.getElementById('imageResult');
            resultDiv.innerHTML = '<p style="color: var(--text-secondary); font-weight: 500;">Analyzing surface anomalies... <span class="loading"></span></p>';
            
            try {
                const response = await fetch('/predict_image', {
                    method: 'POST',
                    body: formData
                });
                
                const responseText = await response.text();
                
                if (!response.ok) {
                    throw new Error(`Server Error (${response.status}): ${responseText.substring(0, 100)}`);
                }
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    throw new Error("Invalid response from server. Check the backend logs.");
                }
                
                resultDiv.innerHTML = `
                    <div style="text-align: center;">
                        <img src="data:image/jpeg;base64,${data.image}" id="resultImage" alt="Detection Result" style="margin-bottom: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    </div>
                    <div class="result-info">
                        <p><strong>Detected Anomalies (Potholes):</strong> ${data.pothole_count}</p>
                        <p><strong>Inference Time:</strong> ${data.processing_time}s</p>
                    </div>
                `;
                
                updateStats();
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: var(--danger); background: rgba(225, 29, 72, 0.1); padding: 1rem; border-radius: 8px;">Error: ${error.message}. Is your backend running on port 5000?</p>`;
            }
        }

        async function uploadVideo(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('video', file);
            
            const resultDiv = document.getElementById('videoResult');
            resultDiv.innerHTML = '<p style="color: var(--text-secondary); font-weight: 500;">Rendering processed video feed... This may take a moment. <span class="loading"></span></p>';
            
            try {
                const response = await fetch('/predict_video', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server Error (${response.status}): ${errorText.substring(0, 100)}`);
                }
                
                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);
                
                resultDiv.innerHTML = `
                    <video controls id="resultVideo" src="${videoUrl}" style="margin-bottom: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></video>
                    <div class="result-info" style="border-left: 4px solid var(--success);">
                        <p><strong>Video processing completed successfully!</strong></p>
                    </div>
                `;
                
                updateStats();
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: var(--danger); background: rgba(225, 29, 72, 0.1); padding: 1rem; border-radius: 8px;">Error: ${error.message}. Is your backend running on port 5000?</p>`;
            }
        }

        // Webcam Live Feed Logic
        let webcamStream = null;
        let webcamInterval = null;

        async function startWebcam() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoElement = document.getElementById('videoElement');
                videoElement.srcObject = webcamStream;
                videoElement.style.display = 'block';
                
                document.querySelector('.btn-primary').style.display = 'none';
                document.getElementById('stopWebcamBtn').style.display = 'flex';
                
                webcamInterval = setInterval(captureAndSend, 1500);
            } catch (error) {
                alert('Webcam access failed: ' + error.message);
            }
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                document.getElementById('videoElement').style.display = 'none';
            }
            
            if (webcamInterval) {
                clearInterval(webcamInterval);
            }
            
            document.querySelector('.btn-primary').style.display = 'flex';
            document.getElementById('stopWebcamBtn').style.display = 'none';
            document.getElementById('webcamResult').innerHTML = '';
        }

        async function captureAndSend() {
            const video = document.getElementById("videoElement");
            const canvas = document.getElementById("webcamCanvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0);
            const imageData = canvas.toDataURL("image/jpeg");
            
            try {
                const response = await fetch("/predict_webcam", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: imageData })
                });
                
                const textData = await response.text();
                
                if (!response.ok) {
                    console.error("Backend error:", textData);
                    return;
                }
                
                const data = JSON.parse(textData);
                const resultDiv = document.getElementById("webcamResult");
                resultDiv.innerHTML = "";
                
                const img = document.createElement("img");
                img.src = "data:image/jpeg;base64," + data.image;
                img.style.maxWidth = "100%";
                img.style.borderRadius = "12px";
                
                const infoDiv = document.createElement("div");
                infoDiv.className = "result-info";
                infoDiv.innerHTML = `<p><strong>Live Anomalies Detected:</strong> ${data.pothole_count}</p>`;
                
                resultDiv.appendChild(img);
                resultDiv.appendChild(infoDiv);
            } catch (e) {
                console.error("Webcam prediction error", e);
            }
        }

        // Live Dashboard Updates
        async function updateStats() {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                
                document.getElementById('totalImages').textContent = data.total_images || 0;
                document.getElementById('totalPotholes').textContent = data.total_potholes || 0;
                
                updateChart(data.total_images || 0, data.total_potholes || 0);
            } catch (error) {
                console.error('Stats synchronization issue:', error);
            }
        }

        // Chart Initialization
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        const analyticsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Frames Processed', 'Alerts Generated'],
                datasets: [{
                    label: 'Count',
                    data: [0, 0],
                    backgroundColor: [
                        'rgba(79, 70, 229, 0.85)',
                        'rgba(225, 29, 72, 0.85)'
                    ],
                    borderRadius: 6,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(148, 163, 184, 0.2)' },
                        ticks: { color: '#64748b', font: { family: "'Plus Jakarta Sans'" } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { family: "'Plus Jakarta Sans'", weight: 600 } }
                    }
                }
            }
        });

        function updateChart(images, potholes) {
            analyticsChart.data.datasets[0].data = [images, potholes];
            analyticsChart.update('none');
        }

        // Map Implementation
        const map = L.map('map').setView([22.5937, 78.9629], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const hotspots = [
            { city: 'Mumbai', lat: 19.076, lng: 72.8777, count: 856 },
            { city: 'Delhi', lat: 28.7041, lng: 77.1025, count: 742 },
            { city: 'Bangalore', lat: 12.9716, lng: 77.5946, count: 623 },
            { city: 'Chennai', lat: 13.0827, lng: 80.2707, count: 534 },
            { city: 'Kolkata', lat: 22.5726, lng: 88.3639, count: 467 },
            { city: 'Hyderabad', lat: 17.385, lng: 78.4867, count: 389 },
            { city: 'Pune', lat: 18.5204, lng: 73.8567, count: 312 },
            { city: 'Ahmedabad', lat: 23.0225, lng: 72.5714, count: 278 }
        ];

        hotspots.forEach(hotspot => {
            const circle = L.circle([hotspot.lat, hotspot.lng], {
                color: '#e11d48',
                fillColor: '#e11d48',
                fillOpacity: 0.5,
                radius: Math.sqrt(hotspot.count) * 1500,
                weight: 1
            }).addTo(map);

            circle.bindPopup(`
                <div style="font-family: 'Plus Jakarta Sans', sans-serif; min-width: 120px;">
                    <div style="font-weight: 700; color: #1e293b; font-size: 14px;">${hotspot.city}</div>
                    <div style="color: #64748b; font-size: 12px; margin-top: 4px;">Anomalies: <b style="color: #e11d48; font-size: 14px;">${hotspot.count}</b></div>
                </div>
            `);
        });

        // Bootstrap data
        updateStats();

    </script>
</body>
</html>
